name: Deploy on push

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for completeness, not used on remote)
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to droplet
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          # Каталог git-репозитория на сервере (должен совпадать с WorkingDirectory в systemd / путём к venv)
          WORKDIR: ${{ secrets.WORKDIR || '/opt/terra_app' }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            _sctl() {
              if [ \"\$(id -u)\" -eq 0 ]; then systemctl \"\$@\"
              else sudo -n systemctl \"\$@\"; fi
            }
            _jctl() {
              if [ \"\$(id -u)\" -eq 0 ]; then journalctl \"\$@\"
              else sudo -n journalctl \"\$@\"; fi
            }
            cd \"$WORKDIR\"
            echo '--- deploy context ---'
            echo \"WORKDIR=$WORKDIR\"
            pwd
            ls -la | head -n 80
            echo '--- systemd unit (effective) ---'
            _sctl show -p FragmentPath,DropInPaths,WorkingDirectory,ExecStart terra-api || true
            _sctl cat terra-api --no-pager || true
            echo '--- git repo check ---'
            test -d .git || (echo 'ERROR: WORKDIR is not a git repo (no .git). Check WORKDIR secret vs server path.' && exit 2)
            git pull --rebase
            echo '--- server repo ---'
            pwd
            export GIT_SHA=\$(git rev-parse --short HEAD)
            echo \"GIT_SHA=\$GIT_SHA\"
            echo '--- write GIT_SHA into backend .env (optional) ---'
            BE_ENV=\"$WORKDIR/backend/.env\"
            touch \"\$BE_ENV\"
            (grep -v '^GIT_SHA=' \"\$BE_ENV\" || true; echo \"GIT_SHA=\$GIT_SHA\") > \"\$BE_ENV.tmp\"
            mv \"\$BE_ENV.tmp\" \"\$BE_ENV\"
            git log -1 --oneline
            echo '--- precheck systemd ---'
            whoami
            _sctl is-active terra-api || true
            echo '--- update backend deps ---'
            if [ -x \"$WORKDIR/backend/.venv/bin/pip\" ]; then
              \"$WORKDIR/backend/.venv/bin/pip\" install -r \"$WORKDIR/backend/requirements.txt\"
            else
              echo 'ERROR: backend/.venv not found. On server: cd backend && python3 -m venv .venv && .venv/bin/pip install -r requirements.txt'
              exit 3
            fi
            echo '--- restart API ---'
            _sctl restart terra-api
            _sctl status terra-api --no-pager | head -n 60
            echo '--- recent logs (journalctl) ---'
            _jctl -u terra-api -n 120 --no-pager || true
            echo '--- process check ---'
            ps -ef | grep uvicorn | grep -v grep || true
          "
