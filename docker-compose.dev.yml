version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: terra_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: terra
      POSTGRES_PASSWORD: terra
      POSTGRES_DB: terra_app
    ports:
      - "5432:5432"
    volumes:
      - terra_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terra"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: terra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - terra_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: terra_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - terra_exports:/tmp/terra_exports
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: terra_worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.backend
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: python -m arq app.workers.tasks.WorkerSettings

volumes:
  terra_db_data:
  terra_redis_data:
  terra_exports:
